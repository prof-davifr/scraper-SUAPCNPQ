<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração - Coletor-SUAP</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --primary-hover: #333333;
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --border-color: #000000;
            --input-bg: #ffffff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'EB Garamond', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .campus-list-container {
            border: 1px solid var(--border-color);
            max-height: 250px;
            overflow-y: auto;
            padding: 1rem;
            margin-top: 0.5rem;
            background: #fafafa;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 0.8rem;
            cursor: pointer;
            font-size: 1.05rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group:hover {
            color: var(--text-muted);
        }

        .select-all-container {
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #eee;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 3rem;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.05);
            animation: fade-in 0.8s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            text-align: left;
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.5rem 0;
            background: var(--input-bg);
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-bottom-width: 2px;
        }

        .row {
            display: flex;
            gap: 1.5rem;
        }

        .row .form-group {
            flex: 1;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            font-family: 'EB Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        .btn-small {
            flex: 1;
            padding: 0.4rem;
            background: transparent;
            border: 1px solid var(--border-color);
            font-family: 'EB Garamond', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: var(--primary);
            color: white;
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            font-style: italic;
        }

        .back-link:hover {
            color: var(--text-main);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Configuração</h1>
                <p>Defina o escopo da coleta de dados.</p>
            </div>
            
            <form action="/setup" method="POST">
                <div class="form-group">
                    <label>Escolha os Campi</label>
                    <div class="campus-list-container">
                        <div class="select-all-container">
                            <label class="checkbox-group">
                                <input type="checkbox" id="select-all"> -- Selecionar Todos --
                            </label>
                        </div>
                        {% for campus in campuses %}
                        <label class="checkbox-group">
                            <input type="checkbox" name="campus_filter" value="{{ campus.value }}" class="campus-checkbox">
                            {{ campus.text }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="form-group">
                    <label>Atalhos de Período</label>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <button type="button" class="btn-small" onclick="setYears(1)">Último Ano</button>
                        <button type="button" class="btn-small" onclick="setYears(3)">Últimos 3</button>
                        <button type="button" class="btn-small" onclick="setYears(5)">Últimos 5</button>
                        <button type="button" class="btn-small" onclick="setYears(0)">Tudo</button>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="year_start">Ano Inicial</label>
                        <input type="number" id="year_start" name="year_start" value="2000" required>
                    </div>
                    <div class="form-group">
                        <label for="year_end">Ano Final</label>
                        <input type="number" id="year_end" name="year_end" value="2026" required>
                    </div>
                </div>

                <button type="submit" class="btn">Iniciar Coleta</button>
                
                <a href="/" class="back-link">← Alterar usuário</a>
            </form>
        </div>
    </div>

    <script>
        // Select All functionality
        const selectAll = document.getElementById('select-all');
        const checkboxes = document.querySelectorAll('.campus-checkbox');

        selectAll.addEventListener('change', (e) => {
            checkboxes.forEach(cb => cb.checked = e.target.checked);
        });

        // If any individual checkbox is unchecked, uncheck select-all
        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                if (!cb.checked) selectAll.checked = false;
                if (Array.from(checkboxes).every(c => c.checked)) selectAll.checked = true;
            });
        });

        function setYears(count) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const startInput = document.getElementById('year_start');
            const endInput = document.getElementById('year_end');
            
            endInput.value = currentYear;
            if (count === 0) {
                startInput.value = 2000;
            } else {
                startInput.value = currentYear - count + 1;
            }
        }
    </script>
</body>
</html>
